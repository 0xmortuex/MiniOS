<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniOS</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/boot.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/desktop.css">
  <link rel="stylesheet" href="css/taskbar.css">
  <link rel="stylesheet" href="css/window.css">
  <link rel="stylesheet" href="css/apps.css">
  <link rel="stylesheet" href="css/context-menu.css">
  <link rel="stylesheet" href="css/paint.css">
  <link rel="stylesheet" href="css/musicplayer.css">
  <link rel="stylesheet" href="css/appstore.css">
</head>
<body>
  <div id="boot-screen"></div>
  <div id="desktop" class="hidden">
    <div id="desktop-wallpaper"></div>
    <div id="desktop-icons"></div>
    <div id="selection-rect" class="hidden"></div>
    <div id="windows-container"></div>
    <div id="snap-preview" class="hidden"></div>
    <div id="alt-tab-overlay" class="hidden"></div>
    <div id="desktop-overview" class="hidden"></div>
  </div>
  <div id="taskbar" class="hidden">
    <button id="start-button" title="Start Menu">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
    </button>
    <button id="desktop-switcher-btn" title="Virtual Desktops">
      <svg viewBox="0 0 24 24" width="18" height="18"><rect x="2" y="3" width="9" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="3" width="9" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="14" width="9" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="14" width="9" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/></svg>
    </button>
    <div id="taskbar-windows"></div>
    <div id="system-tray">
      <button id="tray-volume" title="Volume">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.47 4.47 0 002.5-3.5zM14 3.23v2.06a6.51 6.51 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>
      </button>
      <button id="tray-network" title="Connected">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M1 9l2 2a12.73 12.73 0 0118 0l2-2A15.57 15.57 0 001 9zm8 8l3 3 3-3a4.24 4.24 0 00-6 0zm-4-4l2 2a8.48 8.48 0 0110 0l2-2A11.36 11.36 0 005 13z"/></svg>
      </button>
      <button id="tray-notifications" title="Notifications">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 22c1.1 0 2-.9 2-2h-4a2 2 0 002 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </button>
      <div id="tray-clock"></div>
    </div>
  </div>
  <div id="start-menu" class="hidden">
    <div id="start-menu-search">
      <input type="text" id="start-search-input" placeholder="Search apps..." autocomplete="off">
    </div>
    <div id="start-menu-pinned">
      <h3>Pinned</h3>
      <div id="pinned-apps"></div>
    </div>
    <div id="start-menu-all">
      <h3>All Apps</h3>
      <div id="all-apps-list"></div>
    </div>
    <div id="start-menu-bottom">
      <div id="start-user">
        <div id="start-user-avatar"></div>
        <span id="start-username">User</span>
      </div>
      <button id="start-power" title="Power">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42A6.92 6.92 0 0119 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.05.88-3.89 2.29-5.17L5.88 5.46A8.96 8.96 0 003 12a9 9 0 0018 0c0-2.74-1.23-5.19-3.17-6.83z"/></svg>
      </button>
    </div>
  </div>
  <div id="notifications-dropdown" class="hidden">
    <p>No new notifications</p>
  </div>
  <div id="power-menu" class="hidden">
    <button id="power-lock">Lock</button>
    <button id="power-restart">Restart</button>
    <button id="power-shutdown">Shut Down</button>
  </div>
  <div id="shutdown-screen" class="hidden">
    <div id="shutdown-text">Shutting down...</div>
  </div>

  <script src="js/filesystem.js"></script>
  <script src="js/window-manager.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/taskbar.js"></script>
  <script src="js/context-menu.js"></script>
  <script src="js/login.js"></script>
  <script src="js/boot.js"></script>
  <script src="js/apps/notepad.js"></script>
  <script src="js/apps/calculator.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/file-explorer.js"></script>
  <script src="js/apps/image-viewer.js"></script>
  <script src="js/apps/settings.js"></script>
  <script src="js/apps/browser.js"></script>
  <script src="js/apps/music-player.js"></script>
  <script src="js/apps/musicplayer.js"></script>
  <script src="js/apps/paint.js"></script>
  <script src="js/apps/taskmanager.js"></script>
  <script src="js/apps/appstore.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
